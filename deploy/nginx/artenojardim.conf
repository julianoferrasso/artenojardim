# Nginx — Arte no Jardim
#
# Substitui a config PHP anterior, que apontava /var/www/artenojardim como
# document root estático e devolvia 403 desde que o diretório virou um monorepo
# Node. O backup do original fica em /root/deploy-backup/.
#
# Topologia (docs/arquitetura.md §2):
#   artenojardim.com.br        -> store  (Next, :3010)
#   admin.artenojardim.com.br  -> admin  (Next, :3011)
#   api.artenojardim.com.br    -> api    (Express, :4000)
#
# O certificado atual (artenojardim.com) cobre apex + www dos dois domínios.
# api. e admin. entram no cert quando o DNS deles existir.

# ── Compressão ──────────────────────────────────────────────────────────────
# No Nginx (C), não no Express (JS): não ocupa o event loop do Node.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_types text/plain text/css text/xml application/json application/javascript
           application/xml+rss application/rss+xml font/truetype font/opentype
           application/vnd.ms-fontobject image/svg+xml;

# ── Rate limit de borda ─────────────────────────────────────────────────────
# Primeira barreira, antes do Node. Bloquear aqui custa ~1000x menos que
# bloquear na aplicação. O limitador do Express continua valendo: este é por IP
# e grosso; o de lá é por rota e por e-mail.
limit_req_zone $binary_remote_addr zone=artenojardim_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=artenojardim_auth:10m rate=1r/s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP -> HTTPS ───────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name artenojardim.com artenojardim.com.br
                www.artenojardim.com www.artenojardim.com.br
                api.artenojardim.com.br admin.artenojardim.com.br;

    # Exceção: o desafio do certbot precisa responder em HTTP puro, senão a
    # renovação automática falha e o certificado expira em silêncio.
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / { return 301 https://$host$request_uri; }
}

# ── Redireciona .com e www para o canônico ──────────────────────────────────
# Um domínio, um endereço: sem isto o Google indexa 4 URLs do mesmo conteúdo e
# dilui o ranking entre elas.
server {
    listen 443 ssl;
    http2 on;
    server_name artenojardim.com www.artenojardim.com www.artenojardim.com.br;

    ssl_certificate     /etc/letsencrypt/live/artenojardim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artenojardim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://artenojardim.com.br$request_uri;
}

# ── LOJA ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name artenojardim.com.br;

    ssl_certificate     /etc/letsencrypt/live/artenojardim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artenojardim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 2M;
    access_log /var/log/nginx/artenojardim-store.access.log;
    error_log  /var/log/nginx/artenojardim-store.error.log;

    # Assets com hash no nome são imutáveis: o nome muda quando o conteúdo muda,
    # então um ano de cache é seguro e elimina a revalidação.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── ADMIN ───────────────────────────────────────────────────────────────────
# Precisa de: A admin.artenojardim.com.br -> 23.29.114.96
# e do cert incluindo o subdomínio.
server {
    listen 443 ssl;
    http2 on;
    server_name admin.artenojardim.com.br;

    ssl_certificate     /etc/letsencrypt/live/artenojardim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artenojardim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # O painel nunca deve aparecer em busca.
    add_header X-Robots-Tag "noindex, nofollow" always;

    client_max_body_size 12M;
    access_log /var/log/nginx/artenojardim-admin.access.log;
    error_log  /var/log/nginx/artenojardim-admin.error.log;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3011;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── API ─────────────────────────────────────────────────────────────────────
# Precisa de: A api.artenojardim.com.br -> 23.29.114.96
server {
    listen 443 ssl;
    http2 on;
    server_name api.artenojardim.com.br;

    ssl_certificate     /etc/letsencrypt/live/artenojardim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artenojardim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # 12M: o upload vai DIRETO para o storage por URL assinada e não passa por
    # aqui. Isto cobre só o JSON e a rota /uploads/direct do driver local.
    client_max_body_size 12M;
    access_log /var/log/nginx/artenojardim-api.access.log;
    error_log  /var/log/nginx/artenojardim-api.error.log;

    # Login e refresh: 1r/s com burst. Antes de tudo, porque negar aqui é 1000x
    # mais barato do que acordar o Node para negar.
    location ~ ^/api/v1/auth/ {
        limit_req zone=artenojardim_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook do Stripe: SEM rate limit. Bloquear o Stripe faz ele reentregar
    # por dias e, no limite, um pedido pago fica sem confirmação.
    location = /api/v1/webhooks/stripe {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck fora do rate limit: um monitor batendo de minuto em minuto não
    # pode consumir a cota, e um 429 aqui faria o PM2 achar que a instância caiu.
    location = /api/v1/health {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        limit_req zone=artenojardim_api burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
